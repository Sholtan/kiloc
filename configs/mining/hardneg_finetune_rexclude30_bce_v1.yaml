base_config: configs/train_mse.yaml
base_checkpoint: checkpoints/localization/gridrun_20260323_121452/seed_58/kilocnet_best_f1_epoch_68_ema.pth
hardneg_csv: checkpoints/oof/full120_5fold/train_oof_mined_fp_rexclude30.csv

epochs: 10
lr: 2.0e-5
weight_decay: 1.0e-2
batch_size: 8
num_workers: 4
augmentation: false

